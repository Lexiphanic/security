name: "Build and Deploy"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout security disclosure data
        uses: actions/checkout@v6 
        with:
          repository: ${{ github.repository_owner }}/security-disclosure-data
          path: _security-disclosure-data
          token: ${{ secrets.DISCLOSURE_DATA_TOKEN }}
          sparse-checkout: |
            /*
            !*.internal.*
            !*/.internal.*
            !*/*.internal.*
            !*/*/.internal.*
            !*/*/*/.internal.*
            !*/*/*/*/.internal.*
            !*/*/*/*/*/.internal.*
            !*/*/*/*/*/*/.internal.*
          sparse-checkout-cone-mode: false

      - name: Replace disclosures directory with real data
        run: |
          rm -rf ./disclosures
          find _security-disclosure-data -type f -name '*\.internal\.*' -delete
          rm -rf _security-disclosure-data/.git
          mv _security-disclosure-data ./disclosures

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
